{% extends "base.html" %}
{% block title %}Reset Password â€?DGSpace{% endblock %}

{% block content %}
<div class="card" style="max-width:440px;margin:0 auto">
  <h2>Reset Password</h2>
  <div id="alert-box"></div>

  <div id="step-reset">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="new-password" placeholder="Minimum 8 characters">
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="confirm-password" placeholder="Re-enter new password">
    </div>
    <button class="btn" onclick="doReset()">Set New Password</button>
  </div>

  <p style="margin-top:16px;text-align:center;font-size:0.9rem">
    <a href="/login">â†?Back to Log In</a>
  </p>
</div>

<script>
function showAlert(msg, type='error') {
  document.getElementById('alert-box').innerHTML =
    `<div class="alert alert-${type}">${msg}</div>`;
}

async function doReset() {
  const token    = new URLSearchParams(window.location.search).get('token');
  const newPw    = document.getElementById('new-password').value;
  const confirmPw = document.getElementById('confirm-password').value;

  if (!token)          { showAlert('Invalid or missing reset token.'); return; }
  if (!newPw)          { showAlert('Please enter a new password.'); return; }
  if (newPw.length < 8){ showAlert('Password must be at least 8 characters.'); return; }
  if (newPw !== confirmPw) { showAlert('Passwords do not match.'); return; }

  try {
    const res  = await apiFetch('/api/auth/reset-password', {
      method: 'POST',
      body: JSON.stringify({ token, new_password: newPw })
    });
    const data = await res.json();
    if (data.success) {
      showAlert('Password reset! Redirecting to loginâ€?, 'success');
      setTimeout(() => location.href = '/login', 1500);
    } else {
      showAlert(data.message || 'Reset failed. The link may have expired.');
    }
  } catch(e) {
    showAlert('Cannot reach the server.');
  }
}
</script>
{% endblock %}
