{% extends "base.html" %}
{% block title %}Printers — DGSpace{% endblock %}

{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
  <h2 style="color:#1a1a2e">🖨️ Printers</h2>
  <a href="/" style="color:#888;text-decoration:none;font-size:0.9rem">← Home</a>
</div>

<div id="alert-box"></div>

<!-- Add Printer Form -->
<div class="card" style="margin-bottom:24px">
  <h3 style="margin-bottom:16px;color:#1a1a2e">➕ Add New Printer</h3>
  <form id="add-printer-form" onsubmit="addPrinter(event)" style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end">
    <div class="form-group" style="flex:1;min-width:180px;margin-bottom:0">
      <label>Printer Name *</label>
      <input type="text" id="p-name" required placeholder="e.g. Ultimaker S5 #1">
    </div>
    <div class="form-group" style="flex:1;min-width:140px;margin-bottom:0">
      <label>Model</label>
      <input type="text" id="p-model" placeholder="e.g. Ultimaker S5">
    </div>
    <div class="form-group" style="flex:1;min-width:140px;margin-bottom:0">
      <label>Location</label>
      <input type="text" id="p-location" placeholder="e.g. Room 101">
    </div>
    <div class="form-group" style="min-width:120px;margin-bottom:0">
      <label>Status</label>
      <select id="p-status">
        <option value="active">Active</option>
        <option value="maintenance">Maintenance</option>
        <option value="retired">Retired</option>
      </select>
    </div>
    <div class="form-group" style="min-width:160px;margin-bottom:0">
      <label>Accepted File Formats <span style="color:#dc3545">*</span></label>
      <div style="display:flex;gap:12px;align-items:center;padding-top:6px">
        <label style="display:flex;align-items:center;gap:5px;font-weight:normal;cursor:pointer;font-size:0.9rem">
          <input type="checkbox" id="p-fmt-ufp" value="ufp" checked> <code>.ufp</code>
        </label>
        <label style="display:flex;align-items:center;gap:5px;font-weight:normal;cursor:pointer;font-size:0.9rem">
          <input type="checkbox" id="p-fmt-3mf" value="3mf"> <code>.3mf</code>
        </label>
      </div>
    </div>
    <button type="submit" class="btn" style="width:auto;padding:10px 24px;height:fit-content">Add Printer</button>
  </form>
</div>

<!-- Printer List -->
<div class="card">
  <div id="loading" style="text-align:center;padding:32px;color:#888">Loading…</div>

  <div style="overflow-x:auto">
  <table id="printers-table" style="display:none;width:100%">
    <thead>
      <tr>
        <th>#</th>
        <th>Printer Name</th>
        <th>Model</th>
        <th>Location</th>
        <th>File Formats</th>
        <th>Status</th>
        <th>Created</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="printers-body"></tbody>
  </table>
  </div>

  <p id="no-data" style="display:none;text-align:center;color:#888;padding:32px">
    No printers found. Add one above!
  </p>
</div>

<script>
(function() {
  const user = getUser();
  if (!user) { location.href = '/login'; return; }
  if (user.user_type !== 'admin') { location.href = '/'; return; }
  loadPrinters();
})();

function showAlert(msg, type='error') {
  document.getElementById('alert-box').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => { document.getElementById('alert-box').innerHTML = ''; }, 4000);
}

function fmtDate(s) {
  if (!s) return '—';
  try { return new Date(s).toLocaleDateString('en-US'); } catch { return '—'; }
}

function statusBadge(status) {
  const map = {
    active:      'background:#d1e7dd;color:#0a3622;border:1px solid #a3cfbb',
    maintenance: 'background:#fff3cd;color:#856404;border:1px solid #ffc107',
    retired:     'background:#e2e3e5;color:#41464b;border:1px solid #c4c8cb',
  };
  const style = map[status] || map.active;
  return `<span style="${style};padding:2px 10px;border-radius:12px;font-size:0.78rem;font-weight:600;white-space:nowrap;display:inline-block">${status}</span>`;
}

function statusSelStyle(status) {
  const map = {
    active:      'background:#d1e7dd;color:#0a3622;',
    maintenance: 'background:#fff3cd;color:#856404;',
    retired:     'background:#e2e3e5;color:#41464b;',
  };
  return map[status] || '';
}

async function updateStatus(id, selectEl) {
  const newStatus = selectEl.value;
  selectEl.style.cssText = 'padding:3px 8px;border-radius:8px;border:1px solid #ccc;font-size:0.8rem;font-weight:600;cursor:pointer;' + statusSelStyle(newStatus);
  try {
    const res  = await apiFetch(`/api/admin/printers/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
    const data = await res.json();
    if (data.success) {
      showAlert(`Status updated to "${newStatus}".`, 'success');
    } else {
      showAlert(data.message || 'Failed to update status.');
      loadPrinters(); // revert
    }
  } catch(e) {
    showAlert('Network error.');
    loadPrinters();
  }
}

function esc(s) { return s == null ? '—' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadPrinters() {
  try {
    const res  = await apiFetch('/api/admin/printers');
    if (res.status === 401 || res.status === 403) { clearAuth(); location.href = '/login'; return; }
    const data = await res.json();

    document.getElementById('loading').style.display = 'none';

    if (!data.success) { showAlert(data.message || 'Failed to load printers.'); return; }

    const list = data.printers || [];
    if (!list.length) { document.getElementById('no-data').style.display = 'block'; return; }

    document.getElementById('no-data').style.display = 'none';
    const tbody = document.getElementById('printers-body');
    tbody.innerHTML = list.map((p, idx) => {
      const fmts = (p.accepted_file_formats || 'ufp').split(',').map(f =>
        `<code style="background:#e8f0fe;color:#1a73e8;padding:1px 6px;border-radius:4px;font-size:0.75rem">.${f.trim()}</code>`
      ).join(' ');
      return `
      <tr>
        <td>${idx + 1}</td>
        <td>${esc(p.printer_name)}</td>
        <td>${esc(p.model)}</td>
        <td>${esc(p.location)}</td>
        <td style="white-space:nowrap">${fmts}</td>
        <td style="text-align:center">
          <select class="status-sel" data-id="${p.printer_id}" onchange="updateStatus(${p.printer_id}, this)"
            style="padding:3px 8px;border-radius:8px;border:1px solid #ccc;font-size:0.8rem;font-weight:600;cursor:pointer;${statusSelStyle(p.status)}">
            <option value="active"      ${p.status==='active'      ?'selected':''}>Active</option>
            <option value="maintenance" ${p.status==='maintenance' ?'selected':''}>Maintenance</option>
            <option value="retired"     ${p.status==='retired'     ?'selected':''}>Retired</option>
          </select>
        </td>
        <td>${fmtDate(p.created_at)}</td>
        <td style="white-space:nowrap">
          <button class="btn-delete" onclick="deletePrinter(${p.printer_id}, '${esc(p.printer_name).replace(/'/g,"&#39;")}')">🗑 Delete</button>
        </td>
      </tr>`}).join('');

    document.getElementById('printers-table').style.display = 'table';
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<span style="color:#c0392b">Failed to load. Make sure the backend is running.</span>';
  }
}

async function addPrinter(e) {
  e.preventDefault();
  const name   = document.getElementById('p-name').value.trim();
  const model  = document.getElementById('p-model').value.trim();
  const loc    = document.getElementById('p-location').value.trim();
  const status = document.getElementById('p-status').value;

  const fmts = ['ufp','3mf'].filter(f => document.getElementById(`p-fmt-${f}`).checked);
  if (!name) { showAlert('Printer name is required.'); return; }
  if (!fmts.length) { showAlert('Please select at least one accepted file format (.ufp or .3mf).'); return; }

  try {
    const res = await apiFetch('/api/admin/printers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ printer_name: name, model: model || null, location: loc || null, status, accepted_file_formats: fmts.join(',') })
    });
    const data = await res.json();
    if (data.success) {
      showAlert('Printer added successfully!', 'success');
      document.getElementById('add-printer-form').reset();
      document.getElementById('p-fmt-ufp').checked = true; // reset to default
      loadPrinters();
    } else {
      showAlert(data.message || 'Failed to add printer.');
    }
  } catch(err) {
    showAlert('Failed to add printer. Check backend.');
  }
}

async function deletePrinter(id, name) {
  if (!confirm(`Delete printer "${name}"?`)) return;
  try {
    const res  = await apiFetch(`/api/admin/printers/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      showAlert('Printer deleted.', 'success');
      loadPrinters();
    } else {
      showAlert(data.message || 'Failed to delete.');
    }
  } catch(err) {
    showAlert('Failed to delete. Check backend.');
  }
}
</script>
{% endblock %}
