{% extends "base.html" %}
{% block title %}Log In — DGSpace{% endblock %}

{% block content %}
<div class="card" style="max-width:420px;margin:0 auto">
  <h2>Log In to DGSpace</h2>

  <div id="alert-box"></div>

  <!-- ── Step 1: Email + Password ── -->
  <div id="step-password">
    <div class="form-group">
      <label>Account Type</label>
      <select id="user-type">
        <option value="student">Student</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn" onclick="doLogin()">Log In</button>

    <p style="margin-top:16px;text-align:center;font-size:0.9rem">
      Don't have an account? <a href="/accounts/signup">Sign Up</a>
    </p>
  </div>

  <!-- ── Step 2: 2FA TOTP (hidden until needed) ── -->
  <div id="step-2fa" style="display:none">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:2.4rem;margin-bottom:8px">🔐</div>
      <p style="color:#555;font-size:0.95rem">
        Enter the 6-digit code from your authenticator app<br>
        (Google Authenticator / Duo / Microsoft Auth)
      </p>
    </div>
    <div class="form-group">
      <label>Authentication Code</label>
      <input type="text" id="totp-code" placeholder="000000"
             maxlength="6" inputmode="numeric" autocomplete="one-time-code"
             style="text-align:center;font-size:1.4rem;letter-spacing:8px">
    </div>
    <button class="btn" onclick="doVerify2FA()">Verify</button>
    <button class="btn btn-secondary" onclick="backToPassword()"
            style="margin-top:8px">← Back</button>
  </div>
</div>

<script>
let _tempToken = null;

function showAlert(msg, type='error') {
  document.getElementById('alert-box').innerHTML =
    `<div class="alert alert-${type}">${msg}</div>`;
}

async function doLogin() {
  const email     = document.getElementById('email').value.trim();
  const password  = document.getElementById('password').value;
  const user_type = document.getElementById('user-type').value;

  if (!email || !password) { showAlert('Please enter your email and password.'); return; }

  const endpoint = user_type === 'admin' ? '/api/admins/login' : '/api/students/login';

  try {
    const res  = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!data.success) {
      showAlert(data.message || 'Login failed.');
      return;
    }

    if (data.require_2fa) {
      // Server requires TOTP — show step 2
      _tempToken = data.temp_token;
      document.getElementById('step-password').style.display = 'none';
      document.getElementById('step-2fa').style.display      = 'block';
      document.getElementById('totp-code').value = '';
      showAlert('', 'info');   // clear any previous alert
      setTimeout(() => document.getElementById('totp-code').focus(), 50);
      return;
    }

    // No 2FA required — login complete
    saveAuth(data.token, data.user);
    showAlert('Login successful! Redirecting…', 'success');
    setTimeout(() => location.href = '/', 800);

  } catch(e) {
    showAlert('Cannot reach the backend. Make sure both servers are running.');
  }
}

async function doVerify2FA() {
  const code = document.getElementById('totp-code').value.trim();
  if (!code || code.length !== 6) { showAlert('Please enter the 6-digit code.'); return; }

  try {
    const res  = await fetch('/api/2fa/login-verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ temp_token: _tempToken, code })
    });
    const data = await res.json();

    if (data.success) {
      saveAuth(data.token, data.user);
      showAlert('Login successful! Redirecting…', 'success');
      setTimeout(() => location.href = '/', 800);
    } else {
      showAlert(data.message || 'Invalid code. Please try again.');
      document.getElementById('totp-code').value = '';
      document.getElementById('totp-code').focus();
    }
  } catch(e) {
    showAlert('Cannot reach the backend.');
  }
}

function backToPassword() {
  _tempToken = null;
  document.getElementById('step-2fa').style.display      = 'none';
  document.getElementById('step-password').style.display = 'block';
  showAlert('', 'info');
}

// Press Enter to submit whichever step is visible
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('step-2fa').style.display !== 'none') {
    doVerify2FA();
  } else {
    doLogin();
  }
});
</script>
{% endblock %}
